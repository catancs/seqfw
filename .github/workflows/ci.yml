name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt / clippy / test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  python:
    name: Python (maturin / pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
      # `maturin develop` installs into the active virtualenv, so CI must
      # create one — actions/setup-python provides an interpreter, not a venv.
      # Persisting PATH + VIRTUAL_ENV via the env files carries it across steps
      # (each `run:` is a fresh shell, so `source activate` would not stick).
      - name: Create & activate virtualenv
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$PWD/.venv" >> "$GITHUB_ENV"
      - run: pip install maturin pytest
      - run: maturin develop --manifest-path crates/seqfw-py/Cargo.toml
      - run: pytest crates/seqfw-py/tests/ -q

  benchmark:
    name: Benchmark (local block-rate gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: make benchmark-local
